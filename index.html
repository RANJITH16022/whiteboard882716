<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Whiteboard | Cross-Device Sync</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9eef3 0%, #d9e0e8 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .status-bar {
            max-width: 1400px;
            margin: 0 auto 1rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            flex-wrap: wrap;
            gap: 10px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .save-btn {
            background: #2c3e2f;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .save-btn:hover {
            background: #1f2c21;
            transform: scale(0.98);
        }

        .whiteboard {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .link-section {
            background: #fef9e8;
            border-bottom: 2px solid #ffdfb8;
            padding: 1.25rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
        }

        .link-label {
            font-weight: 600;
            font-size: 1rem;
            color: #b45f1b;
            background: #fff0dd;
            padding: 0.4rem 1rem;
            border-radius: 60px;
        }

        .link-input-wrapper {
            flex: 3;
            min-width: 220px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        #urlInput {
            flex: 4;
            padding: 0.8rem 1.2rem;
            border: 1.5px solid #e9d6bd;
            border-radius: 60px;
            font-family: monospace;
            outline: none;
            font-size: 0.95rem;
        }

        #urlInput:focus {
            border-color: #f7b05e;
            box-shadow: 0 0 0 3px rgba(247, 176, 94, 0.2);
        }

        .go-btn {
            background: #2c3e2f;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .go-btn:hover {
            background: #1f2c21;
            transform: scale(0.97);
        }

        .toolbar {
            background: #fafbfc;
            padding: 0.9rem 2rem;
            border-bottom: 1px solid #eaeef2;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
        }

        .tool-btn {
            background: white;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #eef2f7;
            transform: translateY(-1px);
        }

        .image-upload-label {
            background: white;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .image-upload-label:hover {
            background: #eef2f7;
        }

        #imageUpload {
            display: none;
        }

        .editor-container {
            padding: 1.8rem 2rem 2.5rem 2rem;
        }

        .rich-editor {
            background: #fffdf9;
            border-radius: 1.5rem;
            border: 1px solid #f0e3d4;
            min-height: 480px;
            padding: 1.5rem;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            overflow-y: auto;
        }

        .rich-editor:focus {
            border-color: #f7c48b;
            box-shadow: 0 0 0 3px rgba(247, 176, 94, 0.1);
        }

        .rich-editor:empty:before {
            content: "✏️ Start typing... (syncs across all devices)";
            color: #afbbca;
        }

        .rich-editor img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 8px 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            padding: 0.8rem;
            background: #fefaf5;
            border-top: 1px solid #f5e9de;
            color: #8f9aab;
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e272e;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            font-weight: 500;
            white-space: nowrap;
        }
    </style>
</head>
<body>
<div class="status-bar">
    <div class="status-indicator">
        <span class="status-dot"></span>
        <span id="statusText">Connecting to shared whiteboard...</span>
    </div>
    <div>
        <button class="save-btn" id="manualSaveBtn">💾 Sync Now</button>
    </div>
</div>

<div class="whiteboard">
    <div class="link-section">
        <span class="link-label">🔗 Navigate</span>
        <div class="link-input-wrapper">
            <input type="text" id="urlInput" placeholder="Enter website URL (e.g., google.com)" value="https://www.google.com">
            <button class="go-btn" id="goBtn">🚀 Go</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" id="boldBtn"><strong>B</strong></button>
        <button class="tool-btn" id="italicBtn"><em>I</em></button>
        <button class="tool-btn" id="underlineBtn"><u>U</u></button>
        <label class="image-upload-label">
            🖼️ Image
            <input type="file" id="imageUpload" accept="image/*">
        </label>
    </div>

    <div class="editor-container">
        <div id="richEditor" class="rich-editor" contenteditable="true">
            <p>Loading shared whiteboard...</p>
        </div>
    </div>
    <div class="footer-note">
        🌍 SHARED WHITEBOARD • Auto-syncs every 10 seconds • Works across all devices
    </div>
</div>
<div id="toastMsg" class="toast-message"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ============================================
    // ⚠️ IMPORTANT: REPLACE WITH YOUR SUPABASE CREDENTIALS
    // ============================================
    const MY_SUPABASE_URL = 'https://yattwpdxcfixvqngnaok.supabase.co';  // ← REPLACE THIS
    const MY_SUPABASE_ANON_KEY = 'sb_publishable_P03xMIu_SPnFh-uPrr98ug_Ez7q24pf';  // ← REPLACE THIS
    // ============================================
    
    const SHARED_BOARD_ID = 'main_whiteboard';
    
    // ============ GLOBAL VARIABLES ============
    let supabaseClient = null;
    let isUpdatingFromSync = false;
    let isSavingToCloud = false;
    let lastKnownContent = '';
    let pollingInterval = null;
    
    const editor = document.getElementById('richEditor');
    
    // ============ HELPER FUNCTIONS ============
    function showMessage(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        toast.textContent = msg;
        toast.style.background = isError ? '#d32f2f' : '#1e272e';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2000);
    }
    
    function updateStatus(text, isError = false) {
        const statusText = document.getElementById('statusText');
        const dot = document.querySelector('.status-dot');
        if (!statusText) return;
        
        if (isError) {
            statusText.innerHTML = '⚠️ ' + text;
            if (dot) dot.style.background = '#f44336';
        } else if (text.includes('Saving')) {
            statusText.innerHTML = '💾 ' + text;
            if (dot) dot.style.background = '#ff9800';
        } else {
            statusText.innerHTML = '✅ ' + text;
            if (dot) dot.style.background = '#4caf50';
        }
    }
    
    function getCurrentContent() {
        return editor.innerHTML.trim();
    }
    
    // Save to cloud
    async function saveContentToCloud(content, isManual = false) {
        if (!supabaseClient) return false;
        if (isSavingToCloud) return false;
        if (content === lastKnownContent && !isManual) return false;
        
        isSavingToCloud = true;
        if (!isManual) updateStatus('Saving...');
        
        try {
            const { error } = await supabaseClient
                .from('shared_whiteboard')
                .upsert({
                    board_id: SHARED_BOARD_ID,
                    content_html: content,
                    updated_at: new Date().toISOString()
                }, {
                    onConflict: 'board_id'
                });
            
            if (error) throw error;
            
            lastKnownContent = content;
            updateStatus('Connected');
            if (isManual) showMessage('✓ Synced to cloud!');
            
            return true;
        } catch (error) {
            console.error('Save error:', error);
            updateStatus('Error', true);
            showMessage('Failed to sync: ' + error.message, true);
            return false;
        } finally {
            isSavingToCloud = false;
        }
    }
    
    // Load from cloud
    async function loadContentFromCloud() {
        if (!supabaseClient) return;
        if (isUpdatingFromSync) return;
        if (isSavingToCloud) return;
        
        try {
            const { data, error } = await supabaseClient
                .from('shared_whiteboard')
                .select('content_html')
                .eq('board_id', SHARED_BOARD_ID)
                .maybeSingle();
            
            if (error) throw error;
            
            if (data && data.content_html) {
                const cloudContent = data.content_html;
                const currentContent = getCurrentContent();
                
                if (cloudContent !== currentContent && cloudContent !== lastKnownContent) {
                    console.log('New content from cloud, updating...');
                    isUpdatingFromSync = true;
                    editor.innerHTML = cloudContent;
                    lastKnownContent = cloudContent;
                    isUpdatingFromSync = false;
                    showMessage('🔄 Content updated from another device');
                } else if (!lastKnownContent && cloudContent) {
                    editor.innerHTML = cloudContent;
                    lastKnownContent = cloudContent;
                } else if (!data.content_html) {
                    const initialContent = `
                        <p><strong>🌍 Welcome to the SHARED Whiteboard!</strong></p>
                        <p>This whiteboard is <strong>synced across all devices</strong>.</p>
                        <p>🔹 Open this link on multiple devices - they all see the same content</p>
                        <p>🔹 Changes sync automatically every 10 seconds</p>
                        <p>🔹 Images and formatting are preserved</p>
                        <p><br></p>
                        <p><em>✏️ Try typing here, then open this page on another device...</em></p>
                    `;
                    editor.innerHTML = initialContent;
                    await saveContentToCloud(initialContent, true);
                }
            }
        } catch (error) {
            console.error('Load error:', error);
            if (error.message.includes('relation') || error.message.includes('does not exist')) {
                updateStatus('Database setup required', true);
                editor.innerHTML = `
                    <div style="color: #d32f2f; padding: 20px; background: #ffebee; border-radius: 12px;">
                        <strong>⚠️ Database Setup Required</strong><br><br>
                        Please run this SQL in Supabase SQL Editor:
                        <pre style="background: white; padding: 10px; margin-top: 10px; overflow-x: auto;">
CREATE TABLE shared_whiteboard (
    board_id TEXT PRIMARY KEY,
    content_html TEXT,
    updated_at TIMESTAMP DEFAULT NOW()
);
INSERT INTO shared_whiteboard (board_id, content_html) 
VALUES ('main_whiteboard', '<p>Shared whiteboard ready!</p>');
ALTER TABLE shared_whiteboard ENABLE ROW LEVEL SECURITY;
CREATE POLICY "Enable all" ON shared_whiteboard FOR ALL USING (true);</pre>
                    </div>
                `;
            }
        }
    }
    
    // Start polling
    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(() => {
            if (supabaseClient && !isSavingToCloud && !isUpdatingFromSync) {
                loadContentFromCloud();
            }
        }, 10000);
        console.log('Polling started (every 10 seconds)');
    }
    
    // Auto-save after user stops typing
    let saveTimeout;
    function triggerAutoSave() {
        if (saveTimeout) clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            const content = getCurrentContent();
            if (content && content !== '<br>' && content !== lastKnownContent) {
                saveContentToCloud(content, false);
            }
        }, 3000);
    }
    
    // ============ RICH TEXT EDITING ============
    function applyStyle(command) {
        editor.focus();
        document.execCommand(command, false, null);
        triggerAutoSave();
    }
    
    document.getElementById('boldBtn')?.addEventListener('click', () => applyStyle('bold'));
    document.getElementById('italicBtn')?.addEventListener('click', () => applyStyle('italic'));
    document.getElementById('underlineBtn')?.addEventListener('click', () => applyStyle('underline'));
    
    // Image insertion
    document.getElementById('imageUpload')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        if (!file.type.startsWith('image/')) {
            showMessage('Please select an image file', true);
            return;
        }
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            editor.focus();
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.style.maxWidth = '100%';
            img.style.borderRadius = '12px';
            img.style.margin = '8px 0';
            document.execCommand('insertHTML', false, img.outerHTML);
            triggerAutoSave();
            showMessage('🖼️ Image added');
        };
        reader.readAsDataURL(file);
        e.target.value = '';
    });
    
    // Paste images
    editor.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (let item of items) {
            if (item.type.indexOf('image') !== -1) {
                e.preventDefault();
                const blob = item.getAsFile();
                const reader = new FileReader();
                reader.onload = (ev) => {
                    editor.focus();
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.style.maxWidth = '100%';
                    document.execCommand('insertHTML', false, img.outerHTML);
                    triggerAutoSave();
                    showMessage('📸 Image pasted');
                };
                reader.readAsDataURL(blob);
                break;
            }
        }
    });
    
    editor.addEventListener('input', () => {
        if (!isUpdatingFromSync) triggerAutoSave();
    });
    editor.addEventListener('keyup', () => {
        if (!isUpdatingFromSync) triggerAutoSave();
    });
    
    // Go button
    function navigateToLink() {
        let url = document.getElementById('urlInput')?.value.trim();
        if (!url) {
            showMessage('Enter a URL', true);
            return;
        }
        if (!url.startsWith('http')) url = 'https://' + url;
        window.open(url, '_blank');
        showMessage(`Opening: ${url}`);
    }
    document.getElementById('goBtn')?.addEventListener('click', navigateToLink);
    document.getElementById('urlInput')?.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') navigateToLink();
    });
    
    // Manual sync button
    document.getElementById('manualSaveBtn')?.addEventListener('click', async () => {
        const content = getCurrentContent();
        await saveContentToCloud(content, true);
    });
    
    // ============ INITIALIZATION ============
    async function init() {
        // Check if credentials are configured
        if (MY_SUPABASE_URL === 'https://your-project-id.supabase.co' || 
            MY_SUPABASE_ANON_KEY === 'your-anon-public-key-here') {
            console.error('Please configure your Supabase credentials in the code!');
            editor.innerHTML = `
                <div style="color: #d32f2f; padding: 40px; text-align: center;">
                    <h3>⚠️ Configuration Required</h3>
                    <p style="margin-top: 20px;">Please edit the HTML file and replace:</p>
                    <pre style="background: #f5f5f5; padding: 10px; margin-top: 10px; text-align: left;">
const MY_SUPABASE_URL = 'https://your-project-id.supabase.co';  // ← REPLACE THIS
const MY_SUPABASE_ANON_KEY = 'your-anon-public-key-here';  // ← REPLACE THIS</pre>
                    <p style="margin-top: 20px;">Get your credentials from: <br>
                    <a href="https://supabase.com/dashboard/project/_/settings/api" target="_blank">
                    Supabase Dashboard → Project Settings → API</a></p>
                </div>
            `;
            updateStatus('Configure credentials', true);
            return;
        }
        
        // Validate URL format
        if (!MY_SUPABASE_URL.startsWith('https://')) {
            console.error('Invalid Supabase URL format');
            editor.innerHTML = '<div style="color: #d32f2f; padding: 40px;"><strong>Error:</strong> Supabase URL must start with https://</div>';
            return;
        }
        
        try {
            supabaseClient = window.supabase.createClient(MY_SUPABASE_URL, MY_SUPABASE_ANON_KEY);
            updateStatus('Connected');
            showMessage('Connected to Supabase!');
            
            startPolling();
            await loadContentFromCloud();
        } catch (error) {
            console.error('Init error:', error);
            updateStatus('Connection failed', true);
            showMessage('Failed to connect: ' + error.message, true);
        }
    }
    
    init();
</script>
</body>
</html>
