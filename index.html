<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared Whiteboard | Real-time Sync Across Devices</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9eef3 0%, #d9e0e8 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .status-bar {
            max-width: 1400px;
            margin: 0 auto 1rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        .online-count {
            background: #e8f5e9;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #2e7d32;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .save-btn {
            background: #2c3e2f;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .save-btn:hover {
            background: #1f2c21;
            transform: scale(0.98);
        }

        .whiteboard {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .link-section {
            background: #fef9e8;
            border-bottom: 2px solid #ffdfb8;
            padding: 1.25rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
        }

        .link-label {
            font-weight: 600;
            font-size: 1rem;
            color: #b45f1b;
            background: #fff0dd;
            padding: 0.4rem 1rem;
            border-radius: 60px;
        }

        .link-input-wrapper {
            flex: 3;
            min-width: 220px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        #urlInput {
            flex: 4;
            padding: 0.8rem 1.2rem;
            border: 1.5px solid #e9d6bd;
            border-radius: 60px;
            font-family: monospace;
            outline: none;
            font-size: 0.95rem;
        }

        #urlInput:focus {
            border-color: #f7b05e;
            box-shadow: 0 0 0 3px rgba(247, 176, 94, 0.2);
        }

        .go-btn {
            background: #2c3e2f;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .go-btn:hover {
            background: #1f2c21;
            transform: scale(0.97);
        }

        .toolbar {
            background: #fafbfc;
            padding: 0.9rem 2rem;
            border-bottom: 1px solid #eaeef2;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
        }

        .tool-btn {
            background: white;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tool-btn:hover {
            background: #eef2f7;
            transform: translateY(-1px);
        }

        .image-upload-label {
            background: white;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .image-upload-label:hover {
            background: #eef2f7;
        }

        #imageUpload {
            display: none;
        }

        .editor-container {
            padding: 1.8rem 2rem 2.5rem 2rem;
        }

        .rich-editor {
            background: #fffdf9;
            border-radius: 1.5rem;
            border: 1px solid #f0e3d4;
            min-height: 480px;
            padding: 1.5rem;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            overflow-y: auto;
        }

        .rich-editor:focus {
            border-color: #f7c48b;
            box-shadow: 0 0 0 3px rgba(247, 176, 94, 0.1);
        }

        .rich-editor:empty:before {
            content: "✏️ Start typing... (syncs across all devices)";
            color: #afbbca;
        }

        .rich-editor img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 8px 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            padding: 0.8rem;
            background: #fefaf5;
            border-top: 1px solid #f5e9de;
            color: #8f9aab;
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e272e;
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            font-weight: 500;
            white-space: nowrap;
        }

        .sync-indicator {
            font-size: 0.7rem;
            margin-left: 10px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="status-bar">
    <div class="status-indicator">
        <span class="status-dot"></span>
        <span id="statusText">Connecting to shared whiteboard...</span>
        <span class="sync-indicator" id="syncIndicator"></span>
    </div>
    <div>
        <button class="save-btn" id="manualSaveBtn">💾 Save Now</button>
        <span class="online-count" id="onlineCount">🌍 Shared Board</span>
    </div>
</div>

<div class="whiteboard">
    <div class="link-section">
        <span class="link-label">🔗 Navigate</span>
        <div class="link-input-wrapper">
            <input type="text" id="urlInput" placeholder="Enter website URL (e.g., google.com or https://example.com)" value="https://www.google.com">
            <button class="go-btn" id="goBtn">🚀 Go</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" id="boldBtn"><strong>B</strong> Bold</button>
        <button class="tool-btn" id="italicBtn"><em>I</em> Italic</button>
        <button class="tool-btn" id="underlineBtn"><u>U</u> Underline</button>
        <label class="image-upload-label">
            🖼️ Insert Image
            <input type="file" id="imageUpload" accept="image/*">
        </label>
    </div>

    <div class="editor-container">
        <div id="richEditor" class="rich-editor" contenteditable="true">
            <p>Loading shared whiteboard...</p>
        </div>
    </div>
    <div class="footer-note">
        🌍 SHARED WHITEBOARD • Changes appear on all devices in real-time • Auto-saves to cloud
    </div>
</div>
<div id="toastMsg" class="toast-message"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ============ SUPABASE CONFIGURATION ============
    // ⚠️ IMPORTANT: Replace these with your actual Supabase credentials!
    const MY_SUPABASE_URL = 'YOUR_SUPABASE_URL';  // Get from https://supabase.com/dashboard/project/_/settings/api
    const MY_SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';  // Your anon public key
    
    // SHARED WHITEBOARD ID - everyone sees the same board
    const SHARED_BOARD_ID = 'main_whiteboard';  // All devices use this same ID
    
    let supabaseClient = null;
    let channel = null;
    let isUpdatingFromSync = false;
    let lastSavedContent = '';
    
    // ============ GLOBAL VARIABLES ============
    const editor = document.getElementById('richEditor');
    let autoSaveTimer = null;
    let isSaving = false;
    
    // ============ HELPER FUNCTIONS ============
    function showMessage(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        if (!toast) return;
        toast.textContent = msg;
        toast.style.background = isError ? '#d32f2f' : '#1e272e';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 3000);
    }
    
    function updateStatus(text, isError = false) {
        const statusText = document.getElementById('statusText');
        const dot = document.querySelector('.status-dot');
        if (!statusText) return;
        
        if (isError) {
            statusText.innerHTML = '⚠️ ' + text;
            if (dot) dot.style.background = '#f44336';
        } else if (text.includes('Saving')) {
            statusText.innerHTML = '💾 ' + text;
            if (dot) dot.style.background = '#ff9800';
        } else if (text.includes('Syncing') || text.includes('Real-time')) {
            statusText.innerHTML = '🔄 ' + text;
            if (dot) dot.style.background = '#2196f3';
        } else if (text.includes('Loaded') || text.includes('Connected')) {
            statusText.innerHTML = '✅ ' + text;
            if (dot) dot.style.background = '#4caf50';
        } else {
            statusText.innerHTML = '🔄 ' + text;
        }
    }
    
    function updateSyncIndicator(lastSyncTime) {
        const indicator = document.getElementById('syncIndicator');
        if (!indicator) return;
        
        if (lastSyncTime) {
            const timeAgo = Math.floor((Date.now() - lastSyncTime) / 1000);
            if (timeAgo < 5) {
                indicator.innerHTML = '● Live';
                indicator.style.color = '#4caf50';
            } else if (timeAgo < 30) {
                indicator.innerHTML = `○ ${timeAgo}s ago`;
                indicator.style.color = '#ff9800';
            } else {
                indicator.innerHTML = `○ ${timeAgo}s ago`;
                indicator.style.color = '#999';
            }
        }
    }
    
    // ============ REALTIME SYNC WITH SUPABASE ============
    async function setupRealtimeSync() {
        if (!supabaseClient) return;
        
        // Subscribe to changes on the whiteboard table
        channel = supabaseClient
            .channel('whiteboard-sync')
            .on(
                'postgres_changes',
                {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'shared_whiteboard',
                    filter: `board_id=eq.${SHARED_BOARD_ID}`
                },
                (payload) => {
                    console.log('Real-time update received:', payload);
                    if (!isUpdatingFromSync && payload.new && payload.new.content_html) {
                        const newContent = payload.new.content_html;
                        if (newContent !== editor.innerHTML) {
                            isUpdatingFromSync = true;
                            editor.innerHTML = newContent;
                            lastSavedContent = newContent;
                            isUpdatingFromSync = false;
                            showMessage('🔄 Content updated from another device');
                            updateStatus('Synced from cloud');
                            updateSyncIndicator(Date.now());
                        }
                    }
                }
            )
            .subscribe();
            
        console.log('Real-time sync enabled');
    }
    
    // ============ CLOUD STORAGE FUNCTIONS ============
    async function saveContentToCloud(content) {
        if (isSaving || !supabaseClient) return;
        isSaving = true;
        updateStatus('Saving & syncing...');
        
        try {
            const { data, error } = await supabaseClient
                .from('shared_whiteboard')
                .upsert({
                    board_id: SHARED_BOARD_ID,
                    content_html: content,
                    updated_at: new Date().toISOString(),
                    updated_by: localStorage.getItem('device_id') || 'anonymous'
                }, {
                    onConflict: 'board_id'
                });
            
            if (error) throw error;
            lastSavedContent = content;
            updateStatus('Saved & synced to all devices');
            updateSyncIndicator(Date.now());
        } catch (error) {
            console.error('Save error:', error);
            updateStatus('Error saving', true);
            showMessage('Failed to save: ' + error.message, true);
        } finally {
            isSaving = false;
        }
    }
    
    async function loadContentFromCloud() {
        if (!supabaseClient) {
            console.error('Supabase not initialized');
            return;
        }
        
        updateStatus('Loading shared whiteboard...');
        try {
            const { data, error } = await supabaseClient
                .from('shared_whiteboard')
                .select('content_html, updated_at')
                .eq('board_id', SHARED_BOARD_ID)
                .maybeSingle();
            
            if (error) throw error;
            
            if (data && data.content_html) {
                editor.innerHTML = data.content_html;
                lastSavedContent = data.content_html;
                updateStatus('Loaded shared whiteboard');
                showMessage('🌍 Shared whiteboard loaded from cloud');
                console.log('Content loaded, last updated:', data.updated_at);
            } else {
                // First time - create shared whiteboard
                editor.innerHTML = `
                    <p><strong>🌍 Welcome to the SHARED Whiteboard!</strong></p>
                    <p>This whiteboard is <strong>synced across all devices</strong>.</p>
                    <p>🔹 Open this link on multiple devices - they all see the same content</p>
                    <p>🔹 Changes appear in <strong>real-time</strong> on all devices</p>
                    <p>🔹 Images and formatting are preserved</p>
                    <p><br></p>
                    <p><em>✏️ Try typing here, then open this page on another device...</em></p>
                    <p><em>🔄 Changes will appear automatically!</em></p>
                `;
                updateStatus('Creating shared whiteboard');
                // Save initial content to cloud
                await saveContentToCloud(editor.innerHTML);
                lastSavedContent = editor.innerHTML;
            }
            
            // Setup real-time sync after loading
            await setupRealtimeSync();
            
        } catch (error) {
            console.error('Load error:', error);
            updateStatus('Error loading', true);
            showMessage('Failed to load: ' + error.message, true);
            if (editor.innerHTML === '<p>Loading shared whiteboard...</p>') {
                editor.innerHTML = '<p>⚠️ Could not load shared whiteboard. Please check Supabase credentials.</p>';
            }
        }
    }
    
    // Auto-save function
    function triggerAutoSave() {
        if (autoSaveTimer) clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
            const content = editor.innerHTML;
            if (content && content !== '<br>' && content !== '<div><br></div>' && content !== lastSavedContent) {
                saveContentToCloud(content);
            }
        }, 2000); // Save 2 seconds after last edit for faster sync
    }
    
    // ============ RICH TEXT EDITING ============
    function applyStyle(command) {
        editor.focus();
        document.execCommand(command, false, null);
        triggerAutoSave();
    }
    
    // Safely add event listeners with null checks
    const boldBtn = document.getElementById('boldBtn');
    const italicBtn = document.getElementById('italicBtn');
    const underlineBtn = document.getElementById('underlineBtn');
    const imageUpload = document.getElementById('imageUpload');
    const goBtn = document.getElementById('goBtn');
    const urlInputElement = document.getElementById('urlInput');
    const manualSaveBtn = document.getElementById('manualSaveBtn');
    
    if (boldBtn) boldBtn.addEventListener('click', () => applyStyle('bold'));
    if (italicBtn) italicBtn.addEventListener('click', () => applyStyle('italic'));
    if (underlineBtn) underlineBtn.addEventListener('click', () => applyStyle('underline'));
    
    // Image insertion
    if (imageUpload) {
        imageUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            if (!file.type.startsWith('image/')) {
                showMessage('Please select an image file', true);
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                editor.focus();
                const img = document.createElement('img');
                img.src = ev.target.result;
                img.style.maxWidth = '100%';
                img.style.borderRadius = '12px';
                img.style.margin = '8px 0';
                document.execCommand('insertHTML', false, img.outerHTML);
                triggerAutoSave();
                showMessage('🖼️ Image inserted - will sync to all devices');
            };
            reader.readAsDataURL(file);
            e.target.value = '';
        });
    }
    
    // Paste images from clipboard
    editor.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (let item of items) {
            if (item.type.indexOf('image') !== -1) {
                e.preventDefault();
                const blob = item.getAsFile();
                const reader = new FileReader();
                reader.onload = (ev) => {
                    editor.focus();
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.style.maxWidth = '100%';
                    img.style.borderRadius = '12px';
                    document.execCommand('insertHTML', false, img.outerHTML);
                    triggerAutoSave();
                    showMessage('📸 Image pasted - syncing to all devices');
                };
                reader.readAsDataURL(blob);
                break;
            }
        }
    });
    
    // Listen to edits
    editor.addEventListener('input', () => {
        if (!isUpdatingFromSync) {
            triggerAutoSave();
        }
    });
    editor.addEventListener('keyup', () => {
        if (!isUpdatingFromSync) {
            triggerAutoSave();
        }
    });
    
    // ============ GO BUTTON NAVIGATION ============
    function navigateToLink() {
        let url = urlInputElement ? urlInputElement.value.trim() : '';
        
        if (!url) {
            showMessage('Please enter a website URL', true);
            return;
        }
        
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
            url = 'https://' + url;
        }
        
        try {
            new URL(url);
            window.open(url, '_blank', 'noopener,noreferrer');
            showMessage(`Opening: ${url}`);
        } catch (e) {
            showMessage('Invalid URL. Example: google.com or https://example.com', true);
        }
    }
    
    if (goBtn) goBtn.addEventListener('click', navigateToLink);
    
    if (urlInputElement) {
        urlInputElement.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                navigateToLink();
            }
        });
    }
    
    // Manual save button
    if (manualSaveBtn) {
        manualSaveBtn.addEventListener('click', () => {
            saveContentToCloud(editor.innerHTML);
            showMessage('💾 Manually synced to all devices!');
        });
    }
    
    // Keyboard shortcuts
    editor.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
            e.preventDefault();
            saveContentToCloud(editor.innerHTML);
            showMessage('💾 Manually synced to all devices!');
        }
    });
    
    // ============ INITIALIZATION ============
    function initSupabase() {
        if (typeof window.supabase !== 'undefined' && window.supabase.createClient) {
            supabaseClient = window.supabase.createClient(MY_SUPABASE_URL, MY_SUPABASE_ANON_KEY);
            return true;
        }
        return false;
    }
    
    async function init() {
        // Generate device ID for tracking
        if (!localStorage.getItem('device_id')) {
            localStorage.setItem('device_id', 'device_' + Math.random().toString(36).substr(2, 9));
        }
        
        console.log('Device ID:', localStorage.getItem('device_id'));
        console.log('Shared Board ID:', SHARED_BOARD_ID);
        
        // Check if Supabase credentials are configured
        if (MY_SUPABASE_URL === 'https://yattwpdxcfixvqngnaok.supabase.co' || MY_SUPABASE_ANON_KEY === 'sb_publishable_P03xMIu_SPnFh-uPrr98ug_Ez7q24pf') {
            console.error('⚠️ Please configure your Supabase credentials!');
            if (editor) {
                editor.innerHTML = '<div style="color: #d32f2f; padding: 20px; background: #ffebee; border-radius: 12px;"><strong>⚠️ Configuration Required</strong><br><br>Please replace <code>YOUR_SUPABASE_URL</code> and <code>YOUR_SUPABASE_ANON_KEY</code> in the code with your actual Supabase credentials.<br><br>📌 Get them from: <a href="https://supabase.com/dashboard/project/_/settings/api" target="_blank">Supabase Dashboard → Project Settings → API</a></div>';
            }
            showMessage('⚠️ Please configure Supabase credentials in the code', true);
            return;
        }
        
        // Wait for Supabase to be ready
        let retries = 0;
        while (!initSupabase() && retries < 10) {
            await new Promise(resolve => setTimeout(resolve, 500));
            retries++;
        }
        
        if (supabaseClient) {
            await loadContentFromCloud();
        } else {
            console.error('Failed to initialize Supabase');
            if (editor) {
                editor.innerHTML = '<div style="color: #d32f2f; padding: 20px;"><strong>Error:</strong> Failed to load Supabase. Please check your internet connection.</div>';
            }
            showMessage('Failed to initialize Supabase', true);
        }
    }
    
    // Start the app
    init();
</script>
</body>
</html>
