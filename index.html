<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persistent Whiteboard | Cloud Storage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9eef3 0%, #d9e0e8 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* status bar at top */
        .status-bar {
            max-width: 1400px;
            margin: 0 auto 1rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }

        .save-btn {
            background: #2c3e2f;
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .save-btn:hover {
            background: #1f2c21;
            transform: scale(0.98);
        }

        .whiteboard {
            max-width: 1400px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            overflow: hidden;
        }

        .link-section {
            background: #fef9e8;
            border-bottom: 2px solid #ffdfb8;
            padding: 1.25rem 2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
        }

        .link-label {
            font-weight: 600;
            font-size: 1rem;
            color: #b45f1b;
            background: #fff0dd;
            padding: 0.4rem 1rem;
            border-radius: 60px;
        }

        .link-input-wrapper {
            flex: 3;
            min-width: 220px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        #urlInput {
            flex: 4;
            padding: 0.8rem 1.2rem;
            border: 1.5px solid #e9d6bd;
            border-radius: 60px;
            font-family: monospace;
            outline: none;
        }

        .go-btn {
            background: #2c3e2f;
            border: none;
            padding: 0 1.8rem;
            border-radius: 60px;
            font-weight: 700;
            color: white;
            cursor: pointer;
        }

        .toolbar {
            background: #fafbfc;
            padding: 0.9rem 2rem;
            border-bottom: 1px solid #eaeef2;
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            align-items: center;
        }

        .tool-btn {
            background: white;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-weight: 600;
        }

        .tool-btn:hover {
            background: #eef2f7;
        }

        .image-upload-label {
            background: white;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            padding: 0.5rem 1rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        #imageUpload {
            display: none;
        }

        .editor-container {
            padding: 1.8rem 2rem 2.5rem 2rem;
        }

        .rich-editor {
            background: #fffdf9;
            border-radius: 1.5rem;
            border: 1px solid #f0e3d4;
            min-height: 480px;
            padding: 1.5rem;
            font-size: 1rem;
            line-height: 1.6;
            outline: none;
            overflow-y: auto;
        }

        .rich-editor:empty:before {
            content: "✏️ Start typing... (auto-saves to cloud)";
            color: #afbbca;
        }

        .rich-editor img {
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 8px 0;
        }

        .footer-note {
            text-align: center;
            font-size: 0.75rem;
            padding: 0.8rem;
            background: #fefaf5;
            border-top: 1px solid #f5e9de;
            color: #8f9aab;
        }

        .toast-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e272e;
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="status-bar">
    <div class="status-indicator">
        <span class="status-dot"></span>
        <span id="statusText">Connected to cloud</span>
    </div>
    <button class="save-btn" id="manualSaveBtn">💾 Save Now</button>
</div>

<div class="whiteboard">
    <div class="link-section">
        <span class="link-label">🔗 Navigate</span>
        <div class="link-input-wrapper">
            <input type="text" id="urlInput" placeholder="https:// or any website" value="https://www.google.com">
            <button class="go-btn" id="goBtn">Go</button>
        </div>
    </div>

    <div class="toolbar">
        <button class="tool-btn" id="boldBtn"><strong>B</strong> Bold</button>
        <button class="tool-btn" id="italicBtn"><em>I</em> Italic</button>
        <button class="tool-btn" id="underlineBtn"><u>U</u> Underline</button>
        <label class="image-upload-label">
            🖼️ Insert Image
            <input type="file" id="imageUpload" accept="image/*">
        </label>
    </div>

    <div class="editor-container">
        <div id="richEditor" class="rich-editor" contenteditable="true">
            <p>Loading your saved whiteboard...</p>
        </div>
    </div>
    <div class="footer-note">
        ✅ Auto-saves every 3 seconds to cloud • Access from any device • Images stored as base64
    </div>
</div>
<div id="toastMsg" class="toast-message"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ============ SUPABASE CONFIGURATION ============
    // You'll get these from your Supabase project
    const SUPABASE_URL = 'https://yattwpdxcfixvqngnaok.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_P03xMIu_SPnFh-uPrr98ug_Ez7q24pf';
    
    // Initialize Supabase client
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // ============ GLOBAL VARIABLES ============
    const editor = document.getElementById('richEditor');
    let currentUserId = null;
    let autoSaveTimer = null;
    let isSaving = false;
    
    // ============ HELPER FUNCTIONS ============
    function showMessage(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        toast.textContent = msg;
        toast.style.background = isError ? '#d32f2f' : '#1e272e';
        toast.style.opacity = '1';
        setTimeout(() => toast.style.opacity = '0', 2500);
    }
    
    function updateStatus(text, isSaving = false) {
        const statusText = document.getElementById('statusText');
        const dot = document.querySelector('.status-dot');
        if (isSaving) {
            statusText.innerHTML = '💾 ' + text;
            dot.style.background = '#ff9800';
        } else if (text.includes('error') || text.includes('Error')) {
            statusText.innerHTML = '⚠️ ' + text;
            dot.style.background = '#f44336';
        } else {
            statusText.innerHTML = '✅ ' + text;
            dot.style.background = '#4caf50';
        }
    }
    
    // Generate or retrieve user ID from localStorage (persistent across sessions on same device)
    function getUserId() {
        let userId = localStorage.getItem('whiteboard_user_id');
        if (!userId) {
            userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('whiteboard_user_id', userId);
        }
        return userId;
    }
    
    // ============ CLOUD STORAGE FUNCTIONS ============
    async function saveContentToCloud(content) {
        if (isSaving) return;
        isSaving = true;
        updateStatus('Saving...', true);
        
        try {
            const { data, error } = await supabase
                .from('whiteboard_contents')
                .upsert({
                    user_id: currentUserId,
                    content_html: content,
                    updated_at: new Date().toISOString()
                }, {
                    onConflict: 'user_id'
                });
            
            if (error) throw error;
            updateStatus('Saved to cloud');
            showMessage('✨ Content saved to cloud');
        } catch (error) {
            console.error('Save error:', error);
            updateStatus('Error saving - check Supabase setup');
            showMessage('Failed to save: ' + error.message, true);
        } finally {
            isSaving = false;
        }
    }
    
    async function loadContentFromCloud() {
        updateStatus('Loading from cloud...');
        try {
            const { data, error } = await supabase
                .from('whiteboard_contents')
                .select('content_html')
                .eq('user_id', currentUserId)
                .single();
            
            if (error && error.code !== 'PGRST116') { // PGRST116 = no rows found
                throw error;
            }
            
            if (data && data.content_html) {
                editor.innerHTML = data.content_html;
                updateStatus('Loaded from cloud');
                showMessage('📀 Your whiteboard loaded from cloud');
            } else {
                // First time user - set default content
                editor.innerHTML = `
                    <p><strong>✨ Welcome to your Persistent Whiteboard!</strong></p>
                    <p>This content is saved to the <strong>cloud</strong>.</p>
                    <p>🔹 Try refreshing the page - your content will reappear</p>
                    <p>🔹 Open on another device with same user ID</p>
                    <p>🔹 Images are stored permanently</p>
                    <p><em>Start typing anything - auto-saves every 3 seconds!</em></p>
                `;
                updateStatus('Ready - will auto-save');
                // Save initial content
                await saveContentToCloud(editor.innerHTML);
            }
        } catch (error) {
            console.error('Load error:', error);
            updateStatus('Error loading from cloud');
            showMessage('Failed to load: ' + error.message, true);
        }
    }
    
    // Auto-save function
    function triggerAutoSave() {
        if (autoSaveTimer) clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
            const content = editor.innerHTML;
            if (content && content !== '<br>') {
                saveContentToCloud(content);
            }
        }, 3000); // Save 3 seconds after last edit
    }
    
    // ============ RICH TEXT EDITING ============
    function applyStyle(command) {
        editor.focus();
        document.execCommand(command, false, null);
        triggerAutoSave();
    }
    
    document.getElementById('boldBtn').addEventListener('click', () => applyStyle('bold'));
    document.getElementById('italicBtn').addEventListener('click', () => applyStyle('italic'));
    document.getElementById('underlineBtn').addEventListener('click', () => applyStyle('underline'));
    
    // Image insertion
    document.getElementById('imageUpload').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (ev) => {
            editor.focus();
            const img = document.createElement('img');
            img.src = ev.target.result;
            img.style.maxWidth = '100%';
            img.style.borderRadius = '12px';
            document.execCommand('insertHTML', false, img.outerHTML);
            triggerAutoSave();
            showMessage('🖼️ Image inserted');
        };
        reader.readAsDataURL(file);
        e.target.value = '';
    });
    
    // Paste images from clipboard
    editor.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (let item of items) {
            if (item.type.indexOf('image') !== -1) {
                e.preventDefault();
                const blob = item.getAsFile();
                const reader = new FileReader();
                reader.onload = (ev) => {
                    const img = document.createElement('img');
                    img.src = ev.target.result;
                    img.style.maxWidth = '100%';
                    document.execCommand('insertHTML', false, img.outerHTML);
                    triggerAutoSave();
                };
                reader.readAsDataURL(blob);
                break;
            }
        }
    });
    
    // Listen to edits
    editor.addEventListener('input', () => triggerAutoSave());
    editor.addEventListener('keyup', () => triggerAutoSave());
    
    // Manual save button
    document.getElementById('manualSaveBtn').addEventListener('click', () => {
        saveContentToCloud(editor.innerHTML);
    });
    
    // Link navigation
    document.getElementById('goBtn').addEventListener('click', () => {
        let url = document.getElementById('urlInput').value.trim();
        if (!url) return;
        if (!url.startsWith('http')) url = 'https://' + url;
        window.open(url, '_blank');
    });
    
    // Keyboard shortcuts
    editor.addEventListener('keydown', (e) => {
        if (e.ctrlKey || e.metaKey) {
            if (e.key === 's') {
                e.preventDefault();
                saveContentToCloud(editor.innerHTML);
                showMessage('Manually saved!');
            }
        }
    });
    
    // ============ INITIALIZATION ============
    async function init() {
        currentUserId = getUserId();
        await loadContentFromCloud();
        showMessage('Connected to cloud • Auto-saving enabled');
    }
    
    init();
</script>
</body>
</html>
